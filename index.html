<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Landing Pages Workspace</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(249, 115, 22, 0.18), transparent 24rem),
          radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.15), transparent 24rem),
          #020617;
        color: #f8fafc;
      }

      main {
        width: min(100%, 52rem);
        padding: 3rem 1.5rem;
      }

      .card {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1.5rem;
        background: rgba(15, 23, 42, 0.82);
        padding: 2rem;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.7;
      }

      ul {
        margin: 2rem 0 0;
        padding: 0;
        list-style: none;
      }

      li + li {
        margin-top: 0.75rem;
      }

      a {
        color: #fb923c;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Landing Pages Workspace</h1>
        <p>Repozytorium zostało przestawione na model wielu landingów. Aktualna publikacja jest dostępna w katalogu poniżej.</p>
        <ul>
          <li><a href="./landing-pages/inwestowanie-w-kryzysie/index.html">landing-pages/inwestowanie-w-kryzysie/index.html</a></li>
          <li><a href="./docs/landing-pages-playbook.md">docs/landing-pages-playbook.md</a></li>
        </ul>
      </div>
    </main>
  </body>
</html>
