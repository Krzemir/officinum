name: Deploy via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload files over SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          LANDING_SLUG="inwestowanie-w-kryzysie"
          REMOTE_PARENT="$(dirname "$SFTP_REMOTE_PATH")"
          REMOTE_DIR="$(basename "$SFTP_REMOTE_PATH")"

          sshpass -p "$SFTP_PASSWORD" sftp -oBatchMode=no -oStrictHostKeyChecking=no -P "$SFTP_PORT" "$SFTP_USERNAME@$SFTP_HOST" <<EOF
          cd $REMOTE_PARENT
          -mkdir $REMOTE_DIR
          cd $REMOTE_DIR
          put landing-pages/$LANDING_SLUG/index.html index.html
          put landing-pages/$LANDING_SLUG/theme.css theme.css
          -mkdir dziekuje
          put landing-pages/$LANDING_SLUG/dziekuje/index.html dziekuje/index.html
          -mkdir assets
          -mkdir assets/images
          put landing-pages/$LANDING_SLUG/assets/images/favicon.svg assets/images/favicon.svg
          put landing-pages/$LANDING_SLUG/assets/images/okladka-dodatek.png assets/images/okladka-dodatek.png
          put landing-pages/$LANDING_SLUG/assets/images/okladka-glowna.png assets/images/okladka-glowna.png
          put landing-pages/$LANDING_SLUG/assets/images/inwestowanie_page.png assets/images/inwestowanie_page.png
          put landing-pages/$LANDING_SLUG/assets/images/inwestowanie_page_dodatek.png assets/images/inwestowanie_page_dodatek.png
          bye
          EOF
