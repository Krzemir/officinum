name: Deploy via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload files over SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          LANDING_SLUG="biznes-bez-firmy"
          REMOTE_PARENT="$(dirname "$SFTP_REMOTE_PATH")"
          REMOTE_DIR="$(basename "$SFTP_REMOTE_PATH")"

          sshpass -p "$SFTP_PASSWORD" sftp -oBatchMode=no -oStrictHostKeyChecking=no -P "$SFTP_PORT" "$SFTP_USERNAME@$SFTP_HOST" <<EOF
          cd $REMOTE_PARENT
          -mkdir $REMOTE_DIR
          cd $REMOTE_DIR
          put landing-pages/$LANDING_SLUG/index.html index.html
          put landing-pages/$LANDING_SLUG/theme.css theme.css
          -mkdir dziekuje
          put landing-pages/$LANDING_SLUG/dziekuje/index.html dziekuje/index.html
          -mkdir assets
          -mkdir assets/images
          put landing-pages/$LANDING_SLUG/assets/images/favicon.svg assets/images/favicon.svg
          put landing-pages/$LANDING_SLUG/assets/images/biznes-bez-firmy-main.jpg assets/images/biznes-bez-firmy-main.jpg
          put landing-pages/$LANDING_SLUG/assets/images/biznes-bez-firmy-bonus-1.jpg assets/images/biznes-bez-firmy-bonus-1.jpg
          put landing-pages/$LANDING_SLUG/assets/images/biznes-bez-firmy-bonus-2.jpg assets/images/biznes-bez-firmy-bonus-2.jpg
          put landing-pages/$LANDING_SLUG/assets/images/problem.jpg assets/images/problem.jpg
          put landing-pages/$LANDING_SLUG/assets/images/rozwiazanie.jpg assets/images/rozwiazanie.jpg
          put landing-pages/$LANDING_SLUG/assets/images/dla\ kogo.jpg assets/images/dla\ kogo.jpg
          put landing-pages/$LANDING_SLUG/assets/images/hero.jpg assets/images/hero.jpg
          put landing-pages/$LANDING_SLUG/assets/images/addon2-group1-digital.jpg assets/images/addon2-group1-digital.jpg
          put landing-pages/$LANDING_SLUG/assets/images/addon2-group2-handmade.jpg assets/images/addon2-group2-handmade.jpg
          put landing-pages/$LANDING_SLUG/assets/images/addon2-group3-sewing.jpg assets/images/addon2-group3-sewing.jpg
          put landing-pages/$LANDING_SLUG/assets/images/addon2-group4-print.jpg assets/images/addon2-group4-print.jpg
          bye
          EOF
